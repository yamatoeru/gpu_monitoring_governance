[[inputs.file]]
  files = ["C:/gpu-agent/status/last_result.json", "C:/gpu-agent/status/heartbeat.json"]
  data_format = "json"
  name_override = "gpu_agent_event"

[[inputs.exec]]
  commands = ["powershell -NoProfile -Command \"$items = @(); nvidia-smi --query-gpu=index,name,utilization.gpu,memory.used,memory.total --format=csv,noheader,nounits | ForEach-Object { $p = $_ -split ','; if ($p.Length -ge 5) { $items += @{ index = $p[0].Trim(); name = $p[1].Trim(); gpu_util = [int]$p[2].Trim(); memory_used_mib = [int]$p[3].Trim(); memory_total_mib = [int]$p[4].Trim() } } }; $items | ConvertTo-Json -Compress\""]
  data_format = "json"
  name_override = "gpu_windows_metrics"
  timeout = "10s"

[[outputs.prometheus_client]]
  listen = ":9273"
  path = "/metrics"
  metric_version = 2
  string_as_label = true
  export_timestamp = true

[[outputs.http]]
  url = "http://ingest.internal:8080/events"
  method = "POST"
  data_format = "json"
  timeout = "5s"
