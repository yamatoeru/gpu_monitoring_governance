[[inputs.file]]
  files = ["/var/log/gpu-agent/last_result.json", "/var/log/gpu-agent/heartbeat.json"]
  data_format = "json"
  name_override = "gpu_agent_event"

[[inputs.prometheus]]
  urls = ["http://127.0.0.1:9400/metrics"]

# Example only. Prefer sending to an internal ingest gateway rather than direct ClickHouse writes.
[[outputs.http]]
  url = "http://ingest.internal:8080/events"
  method = "POST"
  data_format = "json"
  timeout = "5s"
