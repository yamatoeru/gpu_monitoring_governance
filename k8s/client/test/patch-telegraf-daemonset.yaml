apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: telegraf
  namespace: gpu-monitoring
spec:
  template:
    spec:
      nodeSelector: null
      containers:
        - name: telegraf
          image: telegraf:1.33-alpine
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: varlogcontainers
              mountPath: /var/log/containers
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
      volumes:
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
            type: Directory
        - name: varlogpods
          hostPath:
            path: /var/log/pods
            type: Directory
