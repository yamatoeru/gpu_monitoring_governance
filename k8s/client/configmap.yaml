apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-monitoring-config
  namespace: gpu-monitoring
data:
  ingest_url: "http://ingest.internal:8080/events"
  dcgm_scrape_url: "http://dcgm-exporter.gpu-monitoring.svc.cluster.local:9400/metrics"
  telegraf.conf: |
    [[inputs.tail]]
      files = [
        "/var/log/containers/*gpu-agent-validator*.log",
      ]
      from_beginning = false
      name_override = "validator_log_event"
      data_format = "grok"
      grok_patterns = ["%{TIMESTAMP_ISO8601:cri_time} %{NOTSPACE:stream:tag} %{NOTSPACE:logtag:tag} %{GREEDYDATA:message}"]
      character_encoding = "utf-8"
      tagexclude = ["path"]

    [[inputs.tail]]
      files = [
        "/var/log/containers/*dcgm-exporter*.log",
        "/var/log/containers/*telegraf*.log",
      ]
      from_beginning = false
      name_override = "k8s_log_event"
      data_format = "grok"
      grok_patterns = ["%{TIMESTAMP_ISO8601:cri_time} %{NOTSPACE:stream:tag} %{NOTSPACE:logtag:tag} %{GREEDYDATA:message}"]
      character_encoding = "utf-8"
      tagexclude = ["path"]

    [[processors.parser]]
      namepass = ["validator_log_event"]
      parse_fields = ["message"]
      merge = "override"
      data_format = "json"
      tag_keys = ["component", "event_type", "severity", "error_code", "env_type", "os_type"]
      json_string_fields = ["event_time", "host", "message", "root_cause", "recommended_action", "agent_version", "config_version"]

    [[outputs.http]]
      url = "http://ingest.internal:8080/events"
      method = "POST"
      data_format = "json"
      timeout = "5s"
