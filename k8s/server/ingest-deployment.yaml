apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-ingest
  namespace: gpu-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-ingest
  template:
    metadata:
      labels:
        app: gpu-ingest
    spec:
      containers:
        - name: ingest
          image: python:3.12-alpine
          command: ["python", "/app/server.py"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: INGEST_HOST
              value: "0.0.0.0"
            - name: INGEST_PORT
              value: "8080"
            - name: INGEST_OUTPUT_PATH
              value: "/var/log/gpu-ingest/events.ndjson"
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: gpu-ingest-clickhouse
                  key: CLICKHOUSE_URL
                  optional: true
            - name: CLICKHOUSE_DATABASE
              valueFrom:
                secretKeyRef:
                  name: gpu-ingest-clickhouse
                  key: CLICKHOUSE_DATABASE
                  optional: true
            - name: CLICKHOUSE_TABLE
              valueFrom:
                secretKeyRef:
                  name: gpu-ingest-clickhouse
                  key: CLICKHOUSE_TABLE
                  optional: true
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: gpu-ingest-clickhouse
                  key: CLICKHOUSE_USER
                  optional: true
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gpu-ingest-clickhouse
                  key: CLICKHOUSE_PASSWORD
                  optional: true
            - name: CLICKHOUSE_TIMEOUT
              valueFrom:
                secretKeyRef:
                  name: gpu-ingest-clickhouse
                  key: CLICKHOUSE_TIMEOUT
                  optional: true
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
            - name: data
              mountPath: /var/log/gpu-ingest
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: app
          configMap:
            name: gpu-ingest-app
        - name: data
          emptyDir: {}
